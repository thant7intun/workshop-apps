apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
labels:
  - pairs:
      env: dev
images:
  - name: order-service
    newName: ghcr.io/thant7intun/order-service
    newTag: 3-7b34557
replicas:
  - name: order-service
    count: 1
configMapGenerator:
  - name: order-service-config
    envs:
      - .env
secretGenerator:
  - name: order-service-secret
    envs:
      - .secret.env
generatorOptions:
  disableNameSuffixHash: true
